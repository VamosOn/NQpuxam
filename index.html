<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 FAVICON LÉOBET -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="shortcut icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<title>CRUZAMENTO PROFISSIONAL</title>

<style>
body {
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color:#fff;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding:10px;
    overflow-x:hidden;
}

h1 { 
    color: gold; 
    font-size:22px;
    text-shadow: 0 0 10px gold;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(45px, 1fr));
    gap:6px;
    margin:15px auto;
    max-width:500px;
}

.num {
    padding:14px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
    user-select:none;
    transition: all 0.2s ease;

    box-shadow: 
        inset 0 2px 4px rgba(255,255,255,0.1),
        0 4px 6px rgba(0,0,0,0.5);
}

.red { background:#c0392b; }
.black { background:#000; }
.green { background:green; }

.num:hover {
    transform: scale(1.05);
}

.num:active {
    transform: scale(0.9);
}

.selected {
    border:2px solid white;
    box-shadow: 0 0 10px white;
}

.highlight {
    border:2px solid gold;
    box-shadow: 0 0 15px gold;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 5px gold; }
    50% { box-shadow: 0 0 20px gold; }
    100% { box-shadow: 0 0 5px gold; }
}

.result {
    background: linear-gradient(145deg, #1c1c1c, #111);
    padding:15px;
    border-radius:12px;
    margin-top:15px;
    font-size:14px;
    box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

button {
    padding:14px;
    margin:8px;
    font-size:16px;
    border-radius:10px;
    border:none;
    width:90%;
    max-width:300px;
    cursor:pointer;
    font-weight:bold;

    background: linear-gradient(145deg, #ffd700, #b8860b);
    color:#000;

    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: 0.2s;
}

button:active {
    transform: scale(0.95);
}

@media (max-width:480px){
    .num {
        padding:12px;
        font-size:14px;
    }

    h1 {
        font-size:18px;
    }
}
</style>
</head>

<body>

<h1>🔥 CRUZAMENTO DE NÚMEROS</h1>

<div class="grid" id="grid"></div>

<p><b>Selecionados:</b></p>
<p id="selecionados"></p>

<button onclick="analisar()">ANALISAR</button>
<button onclick="resetar()">RESETAR</button>

<div class="result" id="resultado"></div>

<script>

const vermelhos = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

const tabela = {
0:[10,20,30],1:[17,7],2:[2,22],3:[3,33],4:[21,9],
5:[25,15,35],6:[20,17,7],7:[7,17,20],8:[30,0,20],
9:[9,19],10:[0,20,30],11:[30,0,20],12:[33,15],
13:[20,7],14:[17,7],15:[9,5,35],16:[3,33],
17:[17,20,7],18:[2,22],19:[19,9],20:[17,7],
21:[2,22],22:[2,22],23:[0,10],24:[35,15,25],
25:[20,22],26:[0,10,30],27:[17,7,20],
28:[7,17,20],29:[7,17,20],30:[0,20,30],
31:[9,19],32:[0,10,20,30],33:[3,33],
34:[7,20],35:[3,33,15],36:[20,30]
};

let selecionados = [];

function criarGrid(){
    const grid = document.getElementById("grid");

    for(let i=0;i<=36;i++){
        let div = document.createElement("div");
        div.classList.add("num");

        if(i===0) div.classList.add("green");
        else if(vermelhos.includes(i)) div.classList.add("red");
        else div.classList.add("black");

        div.innerText = i;
        div.id = "n"+i;

        div.onclick = ()=>toggle(i);

        grid.appendChild(div);
    }
}

function toggle(n){
    let el = document.getElementById("n"+n);

    if(selecionados.includes(n)){
        selecionados = selecionados.filter(x=>x!==n);
        el.classList.remove("selected");
    } else {
        selecionados.push(n);
        el.classList.add("selected");
    }

    document.getElementById("selecionados").innerText = selecionados.join(", ");
}

function analisar(){

    if(selecionados.length === 0){
        alert("Selecione números");
        return;
    }

    document.getElementById("resultado").innerHTML = "⏳ Analisando...";

    setTimeout(()=>{

        let contagem = {};

        selecionados.forEach(n=>{
            tabela[n].forEach(num=>{
                contagem[num] = (contagem[num] || 0) + 1 + (tabela[n].length * 0.1);
            });
        });

        let ordenado = Object.entries(contagem)
            .sort((a,b)=>b[1]-a[1]);

        let top = ordenado.slice(0,10).map(e=>parseInt(e[0]));
        let top3 = ordenado.slice(0,3).map(e=>parseInt(e[0]));

        document.querySelectorAll(".num").forEach(el=>{
            el.classList.remove("highlight");
            el.style.boxShadow = "";
        });

        let max = ordenado[0][1];

        ordenado.forEach(([num, força])=>{
            let intensidade = força / max;
            let el = document.getElementById("n"+num);
            el.style.boxShadow = `0 0 ${intensidade*20}px gold`;
        });

        top.forEach(n=>{
            document.getElementById("n"+n).classList.add("highlight");
        });

        document.getElementById("resultado").innerHTML = `
            <h2>📊 CRUZAMENTO</h2>
            <p><b>Selecionados:</b> ${selecionados.join(", ")}</p>

            <h3>🎯 ENTRADA FORTE</h3>
            <p>${top3.join(", ")}</p>

            <h3>🔥 MAIS FORTES</h3>
            <p>${top.join(", ")}</p>

            <h4>📈 FORÇA</h4>
            <p>${ordenado.map(e=>e[0]+"("+e[1].toFixed(1)+")").join(" - ")}</p>
        `;

    }, 500);
}

function resetar(){
    selecionados=[];
    document.getElementById("selecionados").innerText="";
    document.getElementById("resultado").innerHTML="";
    document.querySelectorAll(".num").forEach(el=>{
        el.classList.remove("selected");
        el.classList.remove("highlight");
        el.style.boxShadow="";
    });
}

criarGrid();

</script>

</body>
</html>
